<!DOCTYPE html>
<html>

<head>

<title>Team Task Dashboard</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>📋 Team Task Dashboard</h1>

<div class="controls">

<select id="member">

<option>Prajwal</option>
<option>Parikshith</option>
<option>Manjunath</option>
<option>Member4</option>
<option>Member5</option>
<option>Member6</option>

</select>

<input id="task" placeholder="Assign Task">

<button onclick="addTask()">Assign Task</button>

</div>


<!-- FILTER -->
<div style="margin-bottom:15px">

<select id="filterMember" onchange="filterTasks()">

<option value="all">All Tasks</option>
<option>Prajwal</option>
<option>Parikshith</option>
<option>Manjunath</option>
<option>Member4</option>
<option>Member5</option>
<option>Member6</option>

</select>

</div>



<table id="taskTable">

<thead>

<tr>
<th>Date</th>
<th>Assigned To</th>
<th>Task</th>
<th>Status</th>
<th>Completed</th>
<th>Delete</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script type="module" src="script.js"></script>

</body>
</html>
